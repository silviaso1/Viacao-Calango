<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Viação Calango</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="icone-onibus.png" alt="Ícone Viação Calango"> 
                <h1>Viação Calango</h1>
            </div>
            <a href="#" class="link-funcionario">Sou funcionário</a>
        </header>
        <div class="login-box">
            <div class="icon">
                <img src="icone-usuario.png" alt="Ícone de Usuário">
            </div>
            <h2>Fazer login como administrador</h2>
            <form>
                <input type="text" placeholder="Usuário" required>
                <input type="password" placeholder="Senha" required>
                <div class="options">
                    <label><input type="checkbox"> Manter-se conectado</label>
                    <a href="#" class="link-senha">Esqueceu a senha?</a>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
