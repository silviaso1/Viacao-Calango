<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Ônibus - Viação Calango</title>
    <link rel="stylesheet" href="./css/fazerCadastro.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="icone-onibus.png" alt="Ícone Viação Calango">
                <h1>Viação Calango</h1>
            </div>
        </header>
        <h2>Realize o cadastro do ônibus</h2>
        <form class="form-cadastro">
            <input type="text" placeholder="Modelo do ônibus" required>
            <input type="text" placeholder="Placa do veículo" required>
            <input type="text" placeholder="Ano" required>
            <input type="text" placeholder="Capacidade de assentos" required>
            <button type="submit">Cadastrar</button>
        </form>
    </div>
</body>
</html>
