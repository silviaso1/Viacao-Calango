<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueceu a Senha - Viação Calango</title>
    <link rel="stylesheet" href="./css/senha.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="icone-onibus.png" alt="Ícone Viação Calango"> <!-- Insira a imagem correta -->
                <h1>Viação Calango</h1>
            </div>
        </header>
        <div class="reset-box">
            <h2>Esqueci minha senha</h2>
            <p>
                Faça a inserção, não leve mais do que um e-mail com os procedimentos para que você cadastre uma nova senha.
            </p>
            <form>
                <input type="text" placeholder="Usuário" required>
                <button type="submit">Redefinir senha</button>
            </form>
        </div>
    </div>
</body>
</html>
