<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação de Reserva</title>
    <link rel="stylesheet" href="./css/pagamento.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="Logo Viação Calango">
        </header>

        <main>
            <section class="mensagem">
                <img src="check-icon.png" alt="Ícone de confirmação">
                <h1>Passagem reservada com sucesso!</h1>
                <p>Você será redirecionado para a página inicial.</p>
                <p>Veja suas passagens reservadas, cancele suas reservas e veja mais detalhes acessando seu perfil.</p>
            </section>
        </main>

        <footer>
            <img src="logo.png" alt="Logo Viação Calango">
            <div class="icones-sociais">
                <img src="icon-facebook.png" alt="Facebook">
                <img src="icon-instagram.png" alt="Instagram">
                <img src="icon-twitter.png" alt="Twitter">
                <img src="icon-youtube.png" alt="YouTube">
            </div>
            <div class="app-stores">
                <img src="google-play.png" alt="Google Play">
                <img src="app-store.png" alt="App Store">
            </div>
            <p>&copy; 2023 Copyright - Todos os direitos reservados. Viação Calango - Linha Verde</p>
        </footer>
    </div>
</body>
</html>
