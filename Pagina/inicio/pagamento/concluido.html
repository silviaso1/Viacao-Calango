<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação de Reserva</title>
    <link rel="stylesheet" href="./css/concluido.css">
</head>
<body>
    <div>
        <header>
            <img src="../exports/logo.png" alt="Logo Viação Calango">
        </header>

        <main>
            <section class="mensagem">
                <div>
                    <img src="./img/check.png" alt="Ícone de confirmação">
                </div>
                <div>
                    <h1>Passagem reservada com sucesso!</h1>
                <p>Você será redirecionado para a página inicial.</p>
                <p>Veja suas passagens reservadas, cancele suas reservas e veja mais detalhes acessando seu perfil.</p>
                </div>
            </section>
        </main>

        <footer>
            <div class="logo">
                <img src="../exports/logo.png" alt="Logo Viação Calango">
            </div>
            <div class="icones-sociais">
                <img src="icon-instagram.png" alt="Instagram">
                <img src="icon-twitter.png" alt="Twitter">
                <img src="icon-discord.png" alt="Discord">
                <img src="icon-facebook.png" alt="Facebook">
            </div>
            <div class="app-stores">
                <img src="../exports/image 5.png" alt="Google Play">
                <img src="../exports/image 6.png" alt="App Store">
            </div>
            <p>&copy; 2023 Copyright - Todos os direitos reservados</p>
        </footer>
        
    </div>
</body>
</html>
