<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso com Número do Pedido</title>
    <link rel="stylesheet" href="./css/acesso.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="Logo Viação Galango">
            <button>Entrar</button>
        </header>
        <main>
            <div class="acessar">
                <h2>Acesso com número do pedido</h2>
                <form>
                <label>Número do pedido</label>
                <input type="text" placeholder="Digite o número do pedido">
                
                <label>Documento</label>
                <input type="text" placeholder="Digite seu documento">
                
                <button type="submit">Continuar</button>
            </form>
            </div>
        </main>
    </div>
</body>
</html>
